<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLSE — ダッシュボード</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+JP:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script src="sheets.js"></script>
    <style>
        .quick-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--s2);
        }

        .quick-btn {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: var(--s4);
            background: var(--bg-1);
            border: 1px solid var(--line-1);
            border-radius: var(--r2);
            cursor: pointer;
            text-decoration: none;
            transition: var(--mid);
            color: var(--t-1);
        }

        .quick-btn:hover {
            background: var(--bg-3);
            border-color: var(--line-3);
        }

        .quick-btn-label {
            font-size: .6875rem;
            color: var(--t-3);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .06em;
        }

        .quick-btn-title {
            font-size: .9375rem;
            font-weight: 700;
        }

        .quick-btn-sub {
            font-size: .75rem;
            color: var(--t-2);
        }

        .activity-item {
            display: flex;
            align-items: flex-start;
            gap: var(--s3);
            padding: var(--s3) 0;
            border-bottom: 1px solid var(--line-1);
            font-size: .8125rem;
        }

        .activity-item:last-child {
            border-bottom: none;
        }

        .activity-icon {
            width: 28px;
            height: 28px;
            border-radius: var(--r1);
            background: var(--bg-3);
            border: 1px solid var(--line-1);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .activity-text {
            flex: 1;
        }

        .activity-name {
            font-weight: 600;
            color: var(--t-1);
        }

        .activity-time {
            color: var(--t-3);
            font-size: .6875rem;
            margin-top: 2px;
        }

        .mb-lg {
            margin-bottom: var(--s5);
        }

        @media(min-width:768px) {
            .quick-actions {
                grid-template-columns: repeat(4, 1fr);
            }
        }
    </style>
</head>

<body>
    <header class="topbar">
        <span class="topbar-logo">BLSE</span>
        <div class="topbar-right">
            <span class="topbar-user">AOKI</span>
            <button class="topbar-menu-btn" onclick="toggleMenu()">
                <span class="hamburger"><span></span><span></span><span></span></span>
            </button>
        </div>
    </header>

    <div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>
    <nav class="slide-menu" id="slideMenu">
        <button class="menu-close" onclick="toggleMenu()">&#x2715;</button>
        <div class="menu-section-label">メニュー</div>
        <a href="index.html" class="menu-item active">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                <rect x="1" y="1" width="6" height="6" rx="1" fill="currentColor" />
                <rect x="9" y="1" width="6" height="6" rx="1" fill="currentColor" />
                <rect x="1" y="9" width="6" height="6" rx="1" fill="currentColor" />
                <rect x="9" y="9" width="6" height="6" rx="1" fill="currentColor" />
            </svg>
            ダッシュボード
        </a>
        <a href="search.html" class="menu-item">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                <circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.5" />
                <path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
            </svg>
            検索
        </a>
        <a href="check.html" class="menu-item">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                <path d="M2 8l4 4 8-8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg>
            チェック
        </a>
        <a href="sales.html" class="menu-item">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                <path d="M2 13l4-4 3 3 5-8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg>
            営業
        </a>
        <a href="inbox.html" class="menu-item">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                <rect x="1" y="3" width="14" height="10" rx="1.5" stroke="currentColor" stroke-width="1.5" />
                <path d="M1 5l7 5 7-5" stroke="currentColor" stroke-width="1.5" />
            </svg>
            受信トレイ
        </a>
        <a href="log.html" class="menu-item">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                <path d="M2 4h12M2 8h8M2 12h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
            </svg>
            ログ
        </a>
    </nav>

    <main class="main">
        <!-- 統計 -->
        <div class="stats-grid animate-in mb-lg">
            <div class="stat-item">
                <div class="stat-value t-blue" id="stat-unchecked">—</div>
                <div class="stat-label">未チェック</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" style="color:var(--green)" id="stat-email">—</div>
                <div class="stat-label">メール承認</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" style="color:var(--yellow)" id="stat-form">—</div>
                <div class="stat-label">フォーム承認</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" style="color:var(--purple)" id="stat-inbox">—</div>
                <div class="stat-label">送信済み</div>
            </div>
        </div>

        <!-- クイックアクション -->
        <div class="section-label animate-in">クイックアクション</div>
        <div class="quick-actions animate-in mb-lg">
            <a href="search.html" class="quick-btn">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <circle cx="6.5" cy="6.5" r="5" stroke="var(--blue)" stroke-width="1.5" />
                    <path d="M10.5 10.5L14 14" stroke="var(--blue)" stroke-width="1.5" stroke-linecap="round" />
                </svg>
                <span class="quick-btn-label">ステップ 1</span>
                <span class="quick-btn-title">検索</span>
                <span class="quick-btn-sub">新しいリードを探す</span>
            </a>
            <a href="check.html" class="quick-btn">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <path d="M2 8l4 4 8-8" stroke="var(--green)" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
                <span class="quick-btn-label">ステップ 2</span>
                <span class="quick-btn-title">チェック</span>
                <span class="quick-btn-sub" id="qb-check">— 件待機中</span>
            </a>
            <a href="sales.html" class="quick-btn">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <path d="M2 13l4-4 3 3 5-8" stroke="var(--yellow)" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
                <span class="quick-btn-label">ステップ 3</span>
                <span class="quick-btn-title">営業</span>
                <span class="quick-btn-sub" id="qb-sales">— 件送信待ち</span>
            </a>
            <a href="inbox.html" class="quick-btn">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <rect x="1" y="3" width="14" height="10" rx="1.5" stroke="var(--red)" stroke-width="1.5" />
                    <path d="M1 5l7 5 7-5" stroke="var(--red)" stroke-width="1.5" />
                </svg>
                <span class="quick-btn-label">受信</span>
                <span class="quick-btn-title">受信トレイ</span>
                <span class="quick-btn-sub" id="qb-inbox" style="color:var(--red)">— 件未読</span>
            </a>
        </div>

        <!-- タスク -->
        <div class="card animate-in mb-lg">
            <div class="card-header">
                <span class="card-title">
                    <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
                        <path d="M2 4h12M2 8h8M2 12h5" stroke="currentColor" stroke-width="1.5"
                            stroke-linecap="round" />
                    </svg>
                    未対応タスク
                </span>
                <span class="t-muted" id="taskBadge" style="font-size:.75rem;">—</span>
            </div>
            <div id="taskList" style="min-height:48px;">
                <div class="t-muted" style="padding:var(--s3) var(--s4);font-size:.8125rem;">読み込み中...</div>
            </div>
        </div>

        <!-- 最近の操作 -->
        <div class="card animate-in">
            <div class="card-header">
                <span class="card-title">
                    <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
                        <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5" />
                        <path d="M8 5v3l2 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                    </svg>
                    最近の操作
                </span>
            </div>
            <div id="activityList">
                <div class="t-muted" style="padding:var(--s3) var(--s4);font-size:.8125rem;">読み込み中...</div>
            </div>
        </div>
    </main>

    <script>
        function toggleMenu() {
            document.getElementById('slideMenu').classList.toggle('active');
            document.getElementById('menuOverlay').classList.toggle('active');
        }

        // ── タスク完了処理 ────────────────────────────────────────────────
        async function completeTask(btn, sheetRowIndex) {
            btn.disabled = true;
            btn.textContent = '...';
            try {
                await Sheets.updateCellByHeader('タスク', sheetRowIndex, 'ステータス', '完了');
                btn.textContent = '✓';
                btn.style.color = 'var(--green)';
                btn.style.borderColor = 'var(--green)';
                btn.closest('.task-item').style.opacity = '0.4';
            } catch (e) {
                btn.disabled = false;
                btn.textContent = '✓';
                alert('更新失敗: ' + e.message);
            }
        }

        // ── 優先度ラベル変換 ──────────────────────────────────────────────
        function _priorityClass(p) {
            if (!p) return 'low';
            if (p.includes('最優先') || p.includes('🔴')) return 'high';
            if (p.includes('通常') || p.includes('🟡')) return 'medium';
            return 'low';
        }

        // ── 期限表示 ──────────────────────────────────────────────────────
        function _deadlineLabel(isoStr) {
            if (!isoStr) return '';
            const dl = new Date(isoStr);
            const now = new Date();
            const diffH = (dl - now) / 3600000;
            if (diffH < 0) return '<span class="task-deadline urgent">期限超過</span>';
            if (diffH < 24) return '<span class="task-deadline urgent">本日中</span>';
            if (diffH < 72) return '<span class="task-deadline">' + Math.ceil(diffH / 24) + '日以内</span>';
            return '<span class="task-deadline">' + dl.toLocaleDateString('ja-JP', { month: 'numeric', day: 'numeric' }) + 'まで</span>';
        }

        // ── 操作ドット色 ──────────────────────────────────────────────────
        function _dotColor(action) {
            if (!action) return 'dot-blue';
            if (action.includes('保存') || action.includes('完了')) return 'dot-green';
            if (action.includes('却下') || action.includes('失敗')) return 'dot-red';
            if (action.includes('返信') || action.includes('検知')) return 'dot-yellow';
            return 'dot-blue';
        }

        async function loadDashboard() {
            // ── 統計（失敗しても継続） ───────────────────────────────────
            try {
                const [unchecked, email, form, sent] = await Promise.all([
                    Sheets.readAll(CONFIG.SHEETS.UNCHECKED_HP),
                    Sheets.readAll(CONFIG.SHEETS.CHECKED_EMAIL),
                    Sheets.readAll(CONFIG.SHEETS.CHECKED_FORM),
                    Sheets.readAll(CONFIG.SHEETS.SENT),
                ]);
                const el = (id, val) => { const e = document.getElementById(id); if (e) e.textContent = val; };
                el('stat-unchecked', unchecked.length);
                el('stat-email', email.length);
                el('stat-form', form.length);
                el('stat-inbox', sent.length);
                // クイックアクションバッジ更新
                const qbCheck = document.getElementById('qb-check');
                const qbSales = document.getElementById('qb-sales');
                const qbInbox = document.getElementById('qb-inbox');
                if (qbCheck) qbCheck.textContent = unchecked.length + ' 件待機中';
                if (qbSales) qbSales.textContent = (email.length + form.length) + ' 件送信待ち';
                // 返信ログから未対応件数
                try {
                    const replies = await Sheets.readAll(CONFIG.SHEETS.REPLY_LOG || '返信ログ');
                    const unread = replies.filter(r => !r[6] || r[6] === '未対応').length;
                    if (qbInbox) qbInbox.textContent = unread + ' 件未対応';
                } catch { if (qbInbox) qbInbox.textContent = '—'; }

            } catch (e) { console.warn('統計読み込み失敗:', e); }

            // ── タスク一覧（シートなし時は空表示） ─────────────────────
            try {
                const tasks = await Sheets.readAll('タスク');
                // raw配列: [ts(0), title(1), priority(2), deadline(3), company(4), cat(5), status(6)]
                const activeTasks = tasks
                    .map((r, i) => ({ r, sheetRow: i + 2 }))
                    .filter(({ r }) => (r[6] || '') !== '完了')
                    .sort((a, b) => new Date(a.r[3]) - new Date(b.r[3]));

                document.getElementById('taskBadge').textContent = activeTasks.length + '件';
                const taskList = document.getElementById('taskList');
                if (activeTasks.length === 0) {
                    taskList.innerHTML = '<div class="t-muted" style="padding:var(--s3) var(--s4);font-size:.8125rem;">未対応タスクはありません ✅</div>';
                } else {
                    taskList.innerHTML = activeTasks.slice(0, 10).map(({ r, sheetRow }) => `
                        <div class="task-item">
                            <div class="task-priority ${_priorityClass(r[2])}"></div>
                            <div class="task-content">
                                <div class="task-title">${r[1] || '（タイトルなし）'}</div>
                                <div class="task-meta">${_deadlineLabel(r[3])}<span style="color:var(--t-4);margin-left:6px;font-size:.6875rem;">${r[4] || ''}</span></div>
                            </div>
                            <button class="task-check" onclick="completeTask(this, ${sheetRow})">✓</button>
                        </div>
                    `).join('');
                }
            } catch (e) {
                console.warn('タスク読み込み失敗:', e);
                document.getElementById('taskList').innerHTML = '<div class="t-muted" style="padding:var(--s3) var(--s4);font-size:.8125rem;">タスクシート準備中…</div>';
                document.getElementById('taskBadge').textContent = '';
            }

            // ── 操作ログ（シートなし時は空表示） ───────────────────────
            try {
                const logs = await Sheets.readAll(CONFIG.SHEETS.OPERATION_LOG);
                // raw配列: [ts(0), user(1), action(2), target(3), detail(4)]
                const recent = [...logs].reverse().slice(0, 5);
                const actEl = document.getElementById('activityList');
                if (recent.length === 0) {
                    actEl.innerHTML = '<div class="t-muted" style="padding:var(--s3) var(--s4);font-size:.8125rem;">操作ログがありません</div>';
                } else {
                    actEl.innerHTML = recent.map(r => {
                        const ts = r[0] ? new Date(r[0]).toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' }) : '';
                        const label = [r[2], r[3], r[4]].filter(Boolean).join(' — ');
                        return `
                        <div class="activity-item">
                            <div class="activity-icon"><div class="dot ${_dotColor(r[2])}"></div></div>
                            <div class="activity-text">
                                <div class="activity-name">${label}</div>
                                <div class="activity-time">${ts}</div>
                            </div>
                        </div>`;
                    }).join('');
                }
            } catch (e) {
                console.warn('操作ログ読み込み失敗:', e);
                document.getElementById('activityList').innerHTML = '<div class="t-muted" style="padding:var(--s3) var(--s4);font-size:.8125rem;">操作ログ準備中…</div>';
            }
        }
        loadDashboard();
    </script>
    <script>
        window.onerror = function (msg, src, line, col, err) {
            var m = '⚠️ [エラー] ' + msg + (src ? ' (' + src.split('/').pop() + ':' + line + ')' : '');
            if (typeof showToast === 'function') { showToast(m); return false; }
            var t = document.createElement('div');
            t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#ef4444;color:#fff;padding:10px 18px;border-radius:8px;font-size:.8125rem;font-weight:600;z-index:99999;max-width:90vw;word-break:break-all;box-shadow:0 4px 12px rgba(0,0,0,.3);';
            t.textContent = m; document.body.appendChild(t);
            setTimeout(function () { t.remove(); }, 6000);
            return false;
        };
    </script>
</body>

</html>
