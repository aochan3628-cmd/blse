<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLSE — ログイン</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 0.1em;
            color: var(--accent);
            margin-bottom: 8px;
        }

        .tagline {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 40px;
        }

        .g-signin-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .status-msg {
            font-size: 13px;
            padding: 12px 16px;
            border-radius: 8px;
            margin-top: 16px;
            display: none;
        }

        .status-pending {
            background: rgba(251, 191, 36, 0.1);
            border: 1px solid rgba(251, 191, 36, 0.3);
            color: #fbbf24;
        }

        .status-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }

        .status-ok {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #4ade80;
        }

        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 12px auto 0;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="logo">BLSE</div>
        <div class="tagline">Blue Life Sales Engine</div>

        <div class="g-signin-wrap">
            <div id="g_id_onload"
                data-client_id="95449188194-ce0j9pbehfn5712o04evdb1kegp98mr5.apps.googleusercontent.com"
                data-callback="handleCredentialResponse" data-auto_prompt="false">
            </div>
            <div class="g_id_signin" data-type="standard" data-size="large" data-theme="filled_black"
                data-text="signin_with" data-locale="ja">
            </div>
        </div>

        <div class="spinner" id="spinner"></div>
        <div class="status-msg" id="statusMsg"></div>
    </div>

    <script>
        // GAS デプロイURL（公開情報なのでハードコードOK）
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxuIOH3IjKuCPboy4vyAsFw2XlLZyvfQjbSo99GZXMP1wUAHvrnoF1ZsICkRpeFe_4YQQ/exec';


        async function handleCredentialResponse(response) {
            showSpinner(true);
            showStatus('');

            const idToken = response.credential;

            // GAS URLが未設定の場合は仮設定画面へ
            if (!GAS_URL) {
                const url = prompt('GAS デプロイURLを入力してください（初回のみ）');
                if (url) localStorage.setItem('BLSE_GAS_URL', url);
                location.reload();
                return;
            }

            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ action: 'login', token: idToken })
                });
                const data = await res.json();

                if (data.status === 'approved') {
                    // configをlocalStorageに保存
                    localStorage.setItem('BLSE_CONFIG', JSON.stringify(data.config));
                    localStorage.setItem('BLSE_SESSION', data.sessionToken);
                    showStatus('✅ ログイン成功。移動します...', 'ok');
                    const params = new URLSearchParams(location.search);
                    const back = params.get('back') || './search.html';
                    setTimeout(() => { location.href = back; }, 800);

                } else if (data.status === 'pending') {
                    showStatus('📨 申請をオーナーに送信しました。承認メールをお待ちください。', 'pending');

                } else {
                    showStatus('❌ アクセスが拒否されました。', 'error');
                }
            } catch (e) {
                showStatus('⚠️ 通信エラー: ' + e.message, 'error');
            }
            showSpinner(false);
        }

        function showSpinner(on) {
            document.getElementById('spinner').style.display = on ? 'block' : 'none';
        }

        function showStatus(msg, type) {
            const el = document.getElementById('statusMsg');
            if (!msg) { el.style.display = 'none'; return; }
            el.className = 'status-msg status-' + type;
            el.textContent = msg;
            el.style.display = 'block';
        }

        // すでにセッションがあれば即リダイレクト
        if (localStorage.getItem('BLSE_SESSION') && localStorage.getItem('BLSE_CONFIG')) {
            const params = new URLSearchParams(location.search);
            location.href = params.get('back') || './search.html';
        }
    </script>
</body>

</html>
